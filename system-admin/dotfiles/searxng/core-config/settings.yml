# ========================================================
# DarKnightz Search - Ultimate Power User Config (2026.x)
# ========================================================
# 100% clean logs, zero-bloat, maximum discovery.

use_default_settings: false

valkey:
  url: valkey://valkey:6379/0

general:
  debug: false
  instance_name: "DarKnightz Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues
  pwa_colors:
    theme_color_light: "#3050ff"
    background_color_light: "#ffffff"
    theme_color_dark: "#3050ff"
    background_color_dark: "#1e1e1e"

search:
  safe_search: 0
  autocomplete: "google"
  autocomplete_min: 2
  favicon_resolver: "google"
  formats:
    - html
    - json

server:
  # Secret key securely overridden by environment variable
  secret_key: "shhh-secret-is-in-the-env-var"
  image_proxy: true
  http_protocol_version: "1.1"
  limiter: true
  public_instance: false

ui:
  query_in_title: true
  infinite_scroll: true
  default_theme: simple
  theme_args:
    simple_style: dark
  hotkeys: vim

categories_as_tabs:
  general:
  images:
  videos:
  it:
  science:
  news:
  map:
  music:
  files:
  social media:

outgoing:
  enable_http: true
  enable_http2: true
  request_timeout: 8.0
  max_request_timeout: 30.0
  pool_connections: 500
  pool_maxsize: 100

plugins:
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: true
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true

# DOI Resolvers are REQUIRED when use_default_settings: false
doi_resolvers:
  oadoi.org: 'https://oadoi.org/'
  doi.org: 'https://doi.org/'
  sci-hub.se: 'https://sci-hub.se/'
  sci-hub.st: 'https://sci-hub.st/'
  sci-hub.ru: 'https://sci-hub.ru/'

default_doi_resolver: 'oadoi.org'

engines:
  # --- Independent Power (The Pillars) ---
  - name: mojeek
    engine: seznam # Mojeek engine module is often named seznam or uses xpath in some versions, 
    # but based on your file list, 'mojeek.py' exists.
    engine: mojeek
    shortcut: mj

  - name: seznam
    engine: seznam
    shortcut: sz

  - name: qwant
    engine: qwant
    shortcut: qw
    qwant_categ: web

  - name: mwmbl
    engine: mwmbl
    shortcut: mw

  # --- Knowledge ---
  - name: wikipedia
    engine: wikipedia
    shortcut: w

  - name: wikidata
    engine: wikidata
    shortcut: wd

  - name: wolframalpha
    engine: wolframalpha_noapi
    shortcut: wa

  # --- Major Backups ---
  - name: google
    engine: google
    shortcut: g

  - name: google images
    engine: google_images
    shortcut: gi

  - name: bing
    engine: bing
    shortcut: b

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d

  - name: brave
    engine: brave
    shortcut: br

  # --- Tech & Developer ---
  - name: github
    engine: github
    shortcut: gh

  - name: pypi
    engine: pypi
    shortcut: py

  - name: docker hub
    engine: docker_hub
    shortcut: dh

  - name: archlinux
    engine: archlinux
    shortcut: al

  # --- Media ---
  - name: youtube
    engine: youtube_noapi
    shortcut: yt

  - name: piped
    engine: piped
    shortcut: p
    frontend_url: https://piped.video
    backend_url:
      - https://pipedapi.kavin.rocks
      - https://pipedapi.ducks.party

  - name: wallhaven
    engine: wallhaven
    shortcut: wh

  - name: unsplash
    engine: unsplash
    shortcut: us

  - name: soundcloud
    engine: soundcloud
    shortcut: sc

  # --- Additional ---
  - name: bing videos
    engine: bing_videos
    shortcut: bv

  - name: bing news
    engine: bing_news
    shortcut: bn
