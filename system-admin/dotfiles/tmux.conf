# Recommended base settings
set -g prefix C-a                  # Use Ctrl-a like screen (easier than Ctrl-b)
unbind C-b
bind C-a send-prefix
set -g base-index 1                # Windows and panes start at 1
setw -g pane-base-index 1
setw -g automatic-rename on        # Auto-rename windows
set -g renumber-windows on         # Renumber windows when one closes
set -g mouse on                    # Enable mouse support
set -g mode-keys vi                # Vi-style keys in copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # True color support
set-option -g status-position bottom
set -g status-keys vi
set -g history-limit 50000

# Better pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ‾/.config/tmux/tmux.conf ¥; display "Config reloaded!"

# ============================================================================
# NORD THEME STATUS BAR
# ============================================================================

# Nord Color Palette
nord0="#2e3440"   # Polar Night - darkest
nord1="#3b4252"   # Polar Night
nord2="#434c5e"   # Polar Night
nord3="#4c566a"   # Polar Night - lightest
nord4="#d8dee9"   # Snow Storm
nord5="#e5e9f0"   # Snow Storm
nord6="#eceff4"   # Snow Storm - lightest
nord7="#8fbcbb"   # Frost - cyan
nord8="#88c0d0"   # Frost - bright cyan
nord9="#81a1c1"   # Frost - blue
nord10="#5e81ac"  # Frost - dark blue
nord11="#bf616a"  # Aurora - red
nord12="#d08770"  # Aurora - orange
nord13="#ebcb8b"  # Aurora - yellow
nord14="#a3be8c"  # Aurora - green
nord15="#b48ead"  # Aurora - purple

# Status bar design
set -g status-style "bg=$nord0,fg=$nord4"
set -g status-interval 5
set -g status-justify left

# Left side: Session name
set -g status-left-length 50
set -g status-left "#[bg=$nord10,fg=$nord6,bold] 㬚沙 #S #[bg=$nord0,fg=$nord10,nobold]"

# Right side: Battery, CPU, Pane info
set -g status-right-length 100
set -g status-right "#[fg=$nord3]#[bg=$nord3,fg=$nord4] #{battery_icon} #{battery_percentage} #[fg=$nord2]#[bg=$nord2,fg=$nord4]  #{cpu_percentage} #[fg=$nord10]#[bg=$nord10,fg=$nord6,bold] 㬚焚 #P/#I "

# Window status
setw -g window-status-format "#[fg=$nord4,bg=$nord1] #I:#W#F "
setw -g window-status-current-format "#[fg=$nord0,bg=$nord8,bold] #I:#W#F "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=$nord3"
set -g pane-active-border-style "fg=$nord8"

# Message styling
set -g message-style "bg=$nord10,fg=$nord6,bold"
set -g message-command-style "bg=$nord3,fg=$nord4"

# Copy mode styling
setw -g mode-style "bg=$nord10,fg=$nord6"

# ============================================================================
# TPM PLUGINS
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @continuum-restore 'on'

# Battery icons
set -g @batt_icon_charge_tier8 '㬚ｂ'
set -g @batt_icon_charge_tier7 '㬚ａ'
set -g @batt_icon_charge_tier6 '㬚℧'
set -g @batt_icon_charge_tier5 '㬚∩'
set -g @batt_icon_charge_tier4 '㬚∪'
set -g @batt_icon_charge_tier3 '㬚⊃'
set -g @batt_icon_charge_tier2 '㬚⊂'
set -g @batt_icon_charge_tier1 '㬚⊇'
set -g @batt_icon_status_charged '㬚嗇'
set -g @batt_icon_status_charging '㬚ｄ'

# Initialize TPM (keep this at the very bottom!)
run '‾/.tmux/plugins/tpm/tpm'
