<form>
  <h1>Create a Profile</h1>
  <label for="username">Username:</label>
  <input type="text" id="username" name="username" required>
  <br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" onchange="checkEmailFormat()">
  <br>
  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z\d]).{8,}" onfocus="showPasswordRequirements()" onchange="checkPasswordStrength()">
  <br>
  <div id="password-strength-bar"></div>
  <label for="password_confirm">Confirm Password:</label>
  <input type="password" id="password_confirm" name="password_confirm" required onchange="checkPasswordMatch()">
  <br>
  <input type="submit" value="Submit">
</form>

<script>
 function showPasswordRequirements() {
  let requirements = "Password must contain:\n" + 
  "- At least 8 characters\n" +
  "- A number\n" +
  "- An uppercase letter\n" +
  "- A lowercase letter\n" +
  "- A special character";
  alert(requirements);
}


  function checkEmailFormat() {
    let email = document.getElementById("email").value;
    let emailFormat = /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;
    if (!emailFormat.test(email)) {
      alert("Invalid email format.");
    }
  }
